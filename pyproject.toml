[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "BLE"]
ignore = ["UP017"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
disable_error_code = ["import-not-found", "untyped-decorator"]

[[tool.mypy.overrides]]
module = ["collectors.sources.*"]
disallow_untyped_defs = false
